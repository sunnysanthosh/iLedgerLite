name: ledgerlite
description: Mobile-first accounting and ledger app for households and small businesses.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1

  # Local storage
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0
  fl_chart: ^0.69.0

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/certs/isrg_root_x1.pem

  fonts:
    - family: LedgerLite
      fonts:
        - asset: assets/fonts/placeholder.txt
