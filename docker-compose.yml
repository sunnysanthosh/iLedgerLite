version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgerlite
      POSTGRES_USER: ${POSTGRES_USER:-ledgerlite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledgerlite_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8000"
    environment:
      - AUTH_DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - AUTH_REDIS_URL=redis://redis:6379/0
      - AUTH_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - postgres
      - redis

  user-service:
    build: ./services/user-service
    ports:
      - "8002:8000"
    environment:
      - USER_DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - USER_REDIS_URL=redis://redis:6379/1
      - USER_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - postgres
      - redis

  transaction-service:
    build: ./services/transaction-service
    ports:
      - "8003:8000"
    environment:
      - TXN_DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - TXN_REDIS_URL=redis://redis:6379/2
      - TXN_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - postgres
      - redis

  ledger-service:
    build: ./services/ledger-service
    ports:
      - "8004:8000"
    environment:
      - LEDGER_DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - LEDGER_REDIS_URL=redis://redis:6379/3
      - LEDGER_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - postgres
      - redis

  report-service:
    build: ./services/report-service
    ports:
      - "8005:8000"
    environment:
      - REPORT_DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - REPORT_REDIS_URL=redis://redis:6379/4
      - REPORT_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - postgres
      - redis

  ai-service:
    build: ./services/ai-service
    ports:
      - "8006:8000"
    environment:
      - AI_DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - AI_REDIS_URL=redis://redis:6379/5
      - AI_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - postgres
      - redis

  notification-service:
    build: ./services/notification-service
    ports:
      - "8007:8000"
    environment:
      - NOTIFICATION_DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - NOTIFICATION_REDIS_URL=redis://redis:6379/6
      - NOTIFICATION_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - postgres
      - redis

  sync-service:
    build: ./services/sync-service
    ports:
      - "8008:8000"
    environment:
      - SYNC_DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - SYNC_REDIS_URL=redis://redis:6379/7
      - SYNC_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
