version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgerlite
      POSTGRES_USER: ${POSTGRES_USER:-ledgerlite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledgerlite_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  user-service:
    build: ./services/user-service
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis

  transaction-service:
    build: ./services/transaction-service
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - REDIS_URL=redis://redis:6379/2
    depends_on:
      - postgres
      - redis

  ledger-service:
    build: ./services/ledger-service
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - REDIS_URL=redis://redis:6379/3
    depends_on:
      - postgres
      - redis

  report-service:
    build: ./services/report-service
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - REDIS_URL=redis://redis:6379/4
    depends_on:
      - postgres
      - redis

  ai-service:
    build: ./services/ai-service
    ports:
      - "8006:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - REDIS_URL=redis://redis:6379/5
    depends_on:
      - postgres
      - redis

  notification-service:
    build: ./services/notification-service
    ports:
      - "8007:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - REDIS_URL=redis://redis:6379/6
    depends_on:
      - postgres
      - redis

  sync-service:
    build: ./services/sync-service
    ports:
      - "8008:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledgerlite}:${POSTGRES_PASSWORD:-ledgerlite_dev}@postgres:5432/ledgerlite
      - REDIS_URL=redis://redis:6379/7
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
