name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "docker-compose.yml"
  workflow_dispatch:
    inputs:
      services:
        description: "Services to build (comma-separated, or 'all')"
        required: false
        default: "all"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ledgerlite

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        id: changed
        run: |
          ALL="auth-service user-service transaction-service ledger-service report-service ai-service notification-service sync-service"
          # Manual dispatch: honour the input (default = all)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.services }}"
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              SERVICES="$ALL"
            else
              SERVICES=$(echo "$INPUT" | tr ',' ' ')
            fi
          else
            SERVICES=""
            for svc in $ALL; do
              if git diff --name-only HEAD~1 HEAD | grep -q "services/$svc/"; then
                SERVICES="$SERVICES $svc"
              fi
            done
            # On first push or if detection fails, build all
            if [ -z "$SERVICES" ]; then
              SERVICES="$ALL"
            fi
          fi
          echo "services=$(echo $SERVICES | jq -R -c 'split(" ") | map(select(length > 0))')" >> "$GITHUB_OUTPUT"

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          format: table
          exit-code: "0"        # warn-only; don't fail on unfixed base-image CVEs
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  build-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/migrations
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: database
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  notify-failure:
    name: Slack alert on failure
    needs: [detect-changes, build, build-migrations]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && echo "SLACK_WEBHOOK_URL not set — skipping" && exit 0
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ *Docker build / push failed* — \`${{ github.workflow }}\` on \`${{ github.ref_name }}\`\",
              \"attachments\": [{
                \"color\": \"#cc0000\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${GITHUB_SHA:0:7}>\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>\", \"short\": true}
                ]
              }]
            }"
