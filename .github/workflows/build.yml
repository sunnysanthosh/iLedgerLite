name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "docker-compose.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ledgerlite

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        id: changed
        run: |
          SERVICES=""
          for svc in auth-service user-service transaction-service ledger-service report-service ai-service notification-service sync-service; do
            if git diff --name-only HEAD~1 HEAD | grep -q "services/$svc/"; then
              SERVICES="$SERVICES $svc"
            fi
          done
          # On first push or if detection fails, build all
          if [ -z "$SERVICES" ]; then
            SERVICES="auth-service user-service transaction-service ledger-service report-service ai-service notification-service sync-service"
          fi
          echo "services=$(echo $SERVICES | jq -R -c 'split(" ") | map(select(length > 0))')" >> "$GITHUB_OUTPUT"

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
