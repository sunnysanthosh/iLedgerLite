name: Sprint Cost Snapshot

on:
  workflow_dispatch:
    inputs:
      sprint_tag:
        description: "Sprint tag (e.g. sprint-12-done)"
        required: false
        default: "manual"
  push:
    tags:
      - "sprint-*-done"

env:
  PROJECT_ID: project-6737f3c2-e011-49b7-ae4

jobs:
  snapshot:
    name: Capture GCP cost snapshot
    runs-on: ubuntu-latest
    # No environment: staging — uses repo-level GCP_SA_KEY secret.
    # If GCP_SA_KEY is not configured, GCP steps are skipped and the
    # snapshot row is still committed with "no-gcp-creds" in each field.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        id: gcp_auth
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        if: steps.gcp_auth.outcome == 'success'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Capture GCP resource state
        id: costs
        run: |
          SPRINT_TAG="${{ github.ref_name }}"
          # Normalise tag: strip refs/tags/ prefix if present
          SPRINT_TAG="${SPRINT_TAG#refs/tags/}"
          # If not a sprint tag (e.g. triggered by branch push), use input
          if [[ "$SPRINT_TAG" != sprint-*-done ]]; then
            SPRINT_TAG="${{ inputs.sprint_tag }}"
          fi
          SNAPSHOT_DATE=$(date -u +"%Y-%m-%d")
          echo "sprint_tag=$SPRINT_TAG"   >> "$GITHUB_OUTPUT"
          echo "snapshot_date=$SNAPSHOT_DATE" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.gcp_auth.outcome }}" = "success" ]; then
            GKE_NODES=$(gcloud container clusters describe ledgerlite-staging \
              --region us-central1 \
              --format="value(currentNodeCount)" 2>/dev/null || echo "err")
            SQL_TIER=$(gcloud sql instances describe ledgerlite-staging-pg \
              --format="value(settings.tier)" 2>/dev/null || echo "err")
            SQL_STATE=$(gcloud sql instances describe ledgerlite-staging-pg \
              --format="value(state)" 2>/dev/null || echo "err")
          else
            echo "⚠️  GCP_SA_KEY not configured — skipping GCP queries."
            echo "    Add GCP_SA_KEY as a repo secret to enable auto-capture."
            GKE_NODES="no-gcp-creds"
            SQL_TIER="no-gcp-creds"
            SQL_STATE="no-gcp-creds"
          fi

          echo "gke_nodes=$GKE_NODES"   >> "$GITHUB_OUTPUT"
          echo "sql_tier=$SQL_TIER"     >> "$GITHUB_OUTPUT"
          echo "sql_state=$SQL_STATE"   >> "$GITHUB_OUTPUT"

      - name: Append snapshot to cost-snapshots.md
        run: |
          SPRINT_TAG="${{ steps.costs.outputs.sprint_tag }}"
          DATE="${{ steps.costs.outputs.snapshot_date }}"
          GKE_NODES="${{ steps.costs.outputs.gke_nodes }}"
          SQL_TIER="${{ steps.costs.outputs.sql_tier }}"
          SQL_STATE="${{ steps.costs.outputs.sql_state }}"

          # Idempotency: skip if this sprint tag row already exists
          if grep -qF "| ${SPRINT_TAG} |" docs/operations/cost-snapshots.md 2>/dev/null; then
            echo "Row for ${SPRINT_TAG} already exists — skipping duplicate."
            exit 0
          fi

          echo "| ${DATE} | ${SPRINT_TAG} | ${GKE_NODES} | ${SQL_TIER} | ${SQL_STATE} | auto-captured |" \
            >> docs/operations/cost-snapshots.md

          echo "Snapshot appended for ${SPRINT_TAG} on ${DATE}"

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/operations/cost-snapshots.md
          git diff --cached --quiet || git commit -m "chore: cost snapshot at ${{ steps.costs.outputs.sprint_tag }} (${{ steps.costs.outputs.snapshot_date }})"
          git push origin main
