name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Layer 0 — detect which service paths changed (skip unchanged service tests)
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      user: ${{ steps.filter.outputs.user }}
      transaction: ${{ steps.filter.outputs.transaction }}
      ledger: ${{ steps.filter.outputs.ledger }}
      report: ${{ steps.filter.outputs.report }}
      notification: ${{ steps.filter.outputs.notification }}
      ai: ${{ steps.filter.outputs.ai }}
      sync: ${{ steps.filter.outputs.sync }}
      # Cross-cutting: shared/, tests/, database/ changes trigger ALL layers
      cross_cutting: ${{ steps.filter.outputs.cross_cutting }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
            user:
              - 'services/user-service/**'
            transaction:
              - 'services/transaction-service/**'
            ledger:
              - 'services/ledger-service/**'
            report:
              - 'services/report-service/**'
            notification:
              - 'services/notification-service/**'
            ai:
              - 'services/ai-service/**'
            sync:
              - 'services/sync-service/**'
            cross_cutting:
              - 'shared/**'
              - 'tests/**'
              - 'database/**'

  # ---------------------------------------------------------------------------
  # Layer 1 — per-service unit tests (60% coverage gate)
  # Always run if the service itself OR cross-cutting infra changed.
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.service }}, ${{ matrix.enabled }})
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            enabled: ${{ needs.detect-changes.outputs.auth }}
          - service: user-service
            enabled: ${{ needs.detect-changes.outputs.user }}
          - service: transaction-service
            enabled: ${{ needs.detect-changes.outputs.transaction }}
          - service: ledger-service
            enabled: ${{ needs.detect-changes.outputs.ledger }}
          - service: report-service
            enabled: ${{ needs.detect-changes.outputs.report }}
          - service: notification-service
            enabled: ${{ needs.detect-changes.outputs.notification }}
          - service: ai-service
            enabled: ${{ needs.detect-changes.outputs.ai }}
          - service: sync-service
            enabled: ${{ needs.detect-changes.outputs.sync }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.enabled == 'true' || needs.detect-changes.outputs.cross_cutting == 'true'

      - name: Set up Python 3.12
        if: matrix.enabled == 'true' || needs.detect-changes.outputs.cross_cutting == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: matrix.enabled == 'true' || needs.detect-changes.outputs.cross_cutting == 'true'
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        if: matrix.enabled == 'true' || needs.detect-changes.outputs.cross_cutting == 'true'
        working-directory: services/${{ matrix.service }}
        run: python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage report
        if: matrix.enabled == 'true' || needs.detect-changes.outputs.cross_cutting == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Layer 2 — seed-data integrity + smoke tests
  # Always runs when shared/, tests/, or ANY service changes.
  # Validates: shared/test_data.py correctness, health of all 4 ASGI clients,
  # auth flows, basic CRUD under real org scoping.
  # ---------------------------------------------------------------------------
  test-smoke:
    name: smoke tests (cross-service)
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared deps (superset of all service requirements)
        run: |
          pip install \
            fastapi uvicorn sqlalchemy aiosqlite httpx pytest pytest-asyncio \
            anyio python-jose[cryptography] bcrypt pydantic pydantic-settings \
            fakeredis greenlet

      - name: Install per-service deps (for ASGI import)
        run: |
          for svc in auth-service user-service transaction-service ledger-service; do
            pip install -r services/$svc/requirements.txt --quiet
          done

      - name: Run smoke tests
        run: python -m pytest tests/smoke/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Layer 3 — regression tests (data isolation, business rules, edge cases)
  # Runs on every PR. Catches cross-service data integrity breaks.
  # ---------------------------------------------------------------------------
  test-regression:
    name: regression tests (data integrity)
    needs: [detect-changes, test-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          for svc in auth-service user-service transaction-service ledger-service; do
            pip install -r services/$svc/requirements.txt --quiet
          done

      - name: Run regression tests
        run: python -m pytest tests/regression/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Layer 4 — schema consistency gate
  # Validates that shared/test_data.py covers every NOT NULL column on seeded
  # tables. Catches the "org_id not in seed data" class of failure at PR time.
  # ---------------------------------------------------------------------------
  test-schema-consistency:
    name: schema consistency (seed data)
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install sqlalchemy aiosqlite greenlet python-jose[cryptography]

      - name: Validate seed data completeness
        run: python tests/validate_seed_schema.py

  # ---------------------------------------------------------------------------
  # Sprint closure gate — all layers must pass before this succeeds.
  # A PR cannot be merged until every layer is green.
  # ---------------------------------------------------------------------------
  all-tests-passed:
    name: all gates passed
    needs: [test, test-smoke, test-regression, test-schema-consistency]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          results="${{ needs.test.result }} ${{ needs.test-smoke.result }} ${{ needs.test-regression.result }} ${{ needs.test-schema-consistency.result }}"
          echo "Job results: $results"
          for result in $results; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "A required gate failed: $result"
              exit 1
            fi
          done
          echo "All gates passed."

  notify-failure:
    name: Slack alert on failure
    needs: [test, test-smoke, test-regression, test-schema-consistency]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && echo "SLACK_WEBHOOK_URL not set — skipping" && exit 0
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ *Test suite failed* — \`${{ github.workflow }}\` on \`${{ github.ref_name }}\`\",
              \"attachments\": [{
                \"color\": \"#cc0000\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${GITHUB_SHA:0:7}>\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>\", \"short\": true}
                ]
              }]
            }"
