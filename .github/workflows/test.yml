name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      user: ${{ steps.filter.outputs.user }}
      transaction: ${{ steps.filter.outputs.transaction }}
      ledger: ${{ steps.filter.outputs.ledger }}
      report: ${{ steps.filter.outputs.report }}
      notification: ${{ steps.filter.outputs.notification }}
      ai: ${{ steps.filter.outputs.ai }}
      sync: ${{ steps.filter.outputs.sync }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
            user:
              - 'services/user-service/**'
            transaction:
              - 'services/transaction-service/**'
            ledger:
              - 'services/ledger-service/**'
            report:
              - 'services/report-service/**'
              - 'shared/**'
            notification:
              - 'services/notification-service/**'
              - 'shared/**'
            ai:
              - 'services/ai-service/**'
            sync:
              - 'services/sync-service/**'

  test:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            enabled: ${{ needs.detect-changes.outputs.auth }}
          - service: user-service
            enabled: ${{ needs.detect-changes.outputs.user }}
          - service: transaction-service
            enabled: ${{ needs.detect-changes.outputs.transaction }}
          - service: ledger-service
            enabled: ${{ needs.detect-changes.outputs.ledger }}
          - service: report-service
            enabled: ${{ needs.detect-changes.outputs.report }}
          - service: notification-service
            enabled: ${{ needs.detect-changes.outputs.notification }}
          - service: ai-service
            enabled: ${{ needs.detect-changes.outputs.ai }}
          - service: sync-service
            enabled: ${{ needs.detect-changes.outputs.sync }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.enabled == 'true'

      - name: Set up Python 3.12
        if: matrix.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: matrix.enabled == 'true'
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        if: matrix.enabled == 'true'
        working-directory: services/${{ matrix.service }}
        run: python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage report
        if: matrix.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          retention-days: 14

  notify-failure:
    name: Slack alert on failure
    needs: [detect-changes, test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && echo "SLACK_WEBHOOK_URL not set — skipping" && exit 0
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ *Test suite failed* — \`${{ github.workflow }}\` on \`${{ github.ref_name }}\`\",
              \"attachments\": [{
                \"color\": \"#cc0000\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${GITHUB_SHA:0:7}>\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>\", \"short\": true}
                ]
              }]
            }"
