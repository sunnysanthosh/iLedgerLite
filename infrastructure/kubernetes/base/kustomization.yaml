apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Use `labels` (kustomize v5) instead of deprecated `commonLabels`.
# includeSelectors: false avoids mutating immutable Deployment selectors on re-apply.
labels:
  - pairs:
      app.kubernetes.io/part-of: ledgerlite
    includeSelectors: false
    includeTemplates: true

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - resource-quota.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - migrations-job.yaml
  - services/auth-service.yaml
  - services/user-service.yaml
  - services/transaction-service.yaml
  - services/ledger-service.yaml
  - services/report-service.yaml
  - services/ai-service.yaml
  - services/notification-service.yaml
  - services/sync-service.yaml
  - ingress.yaml
  - pdb.yaml
  - hpa.yaml
  - network-policy.yaml
