# PodDisruptionBudgets — ensure minAvailable: 1 during node drain / voluntary disruptions.
# With replicas: 1 (base), this prevents eviction of the single pod.
# With replicas: 2 (production overlay), this ensures zero-downtime rolling updates.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
---
