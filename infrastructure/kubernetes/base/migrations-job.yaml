apiVersion: batch/v1
kind: Job
metadata:
  name: ledgerlite-migrations
  labels:
    app.kubernetes.io/name: ledgerlite-migrations
    app.kubernetes.io/component: migrations
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ledgerlite-migrations
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrations
          image: ghcr.io/sunnysans/ledgerlite/migrations:latest
          env:
            - name: ALEMBIC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ledgerlite-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
