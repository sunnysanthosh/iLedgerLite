apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: user-service
          image: ghcr.io/sunnysanthosh/ledgerlite/user-service:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: USER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ledgerlite-secrets
                  key: DATABASE_URL
            - name: USER_REDIS_URL
              value: redis://redis:6379/1
            - name: USER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ledgerlite-secrets
                  key: JWT_SECRET
            - name: USER_JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: ledgerlite-config
                  key: JWT_ALGORITHM
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app.kubernetes.io/name: user-service
