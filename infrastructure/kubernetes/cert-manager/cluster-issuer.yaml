# ClusterIssuers for Let's Encrypt (cert-manager).
#
# Prerequisites — install cert-manager before applying this file:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
#   kubectl wait --for=condition=Available deployment --all -n cert-manager --timeout=120s
#
# Apply this file once per cluster, then enable TLS in the overlay kustomizations:
#   kubectl apply -f infrastructure/kubernetes/cert-manager/cluster-issuer.yaml
#
# letsencrypt-staging  → use for testing (no rate limits, certificate not trusted by browsers)
# letsencrypt-prod     → use for real HTTPS (trusted, rate-limited: 50 certs/week per domain)
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: sunnys.santhosh@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme01.api.letsencrypt.org/directory
    email: sunnys.santhosh@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
