apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ledgerlite-production

resources:
  - ../../base

patches:
  # Override namespace resource to use production name
  - patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: ledgerlite
      $patch: replace
      apiVersion: v1
      kind: Namespace
      metadata:
        name: ledgerlite-production
        labels:
          app.kubernetes.io/part-of: ledgerlite
          environment: production

  # Production: 2 replicas per microservice
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: not-used
      spec:
        replicas: 2
    target:
      kind: Deployment
      labelSelector: app.kubernetes.io/component=backend

  # Production HPA: minReplicas: 2 (matches replicas: 2 above, no scale-down below 2)
  - patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: not-used
      spec:
        minReplicas: 2
        maxReplicas: 6
    target:
      kind: HorizontalPodAutoscaler

  # Production ingress: TLS via cert-manager (letsencrypt-prod — trusted, rate-limited)
  # Prerequisites: kubectl apply -f infrastructure/kubernetes/cert-manager/cluster-issuer.yaml
  - patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.ledgerlite.app
    target:
      kind: Ingress
      name: ledgerlite-ingress

  - patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: ledgerlite-ingress
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
      spec:
        tls:
          - hosts:
              - api.ledgerlite.app
            secretName: ledgerlite-tls-prod

  # Production secrets (placeholder — replace with sealed-secrets or external-secrets in real deployment)
  - patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: ledgerlite-secrets
      stringData:
        JWT_SECRET: "REPLACE_WITH_PRODUCTION_SECRET"
        DATABASE_USER: "ledgerlite"
        DATABASE_PASSWORD: "REPLACE_WITH_PRODUCTION_PASSWORD"
        DATABASE_URL: "postgresql+asyncpg://ledgerlite:REPLACE_WITH_PRODUCTION_PASSWORD@postgres:5432/ledgerlite"

  # Production image tags
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-service
      spec:
        template:
          spec:
            containers:
              - name: auth-service
                image: ghcr.io/sunnysanthosh/ledgerlite/auth-service:production
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: user-service
      spec:
        template:
          spec:
            containers:
              - name: user-service
                image: ghcr.io/sunnysanthosh/ledgerlite/user-service:production
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: transaction-service
      spec:
        template:
          spec:
            containers:
              - name: transaction-service
                image: ghcr.io/sunnysanthosh/ledgerlite/transaction-service:production
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ledger-service
      spec:
        template:
          spec:
            containers:
              - name: ledger-service
                image: ghcr.io/sunnysanthosh/ledgerlite/ledger-service:production
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: report-service
      spec:
        template:
          spec:
            containers:
              - name: report-service
                image: ghcr.io/sunnysanthosh/ledgerlite/report-service:production
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ai-service
      spec:
        template:
          spec:
            containers:
              - name: ai-service
                image: ghcr.io/sunnysanthosh/ledgerlite/ai-service:production
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-service
      spec:
        template:
          spec:
            containers:
              - name: notification-service
                image: ghcr.io/sunnysanthosh/ledgerlite/notification-service:production
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: sync-service
      spec:
        template:
          spec:
            containers:
              - name: sync-service
                image: ghcr.io/sunnysanthosh/ledgerlite/sync-service:production
