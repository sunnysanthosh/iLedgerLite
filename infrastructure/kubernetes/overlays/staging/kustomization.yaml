apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ledgerlite-staging

resources:
  - ../../base

patches:
  # Override namespace resource to use staging name
  - patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: ledgerlite
      $patch: replace
      apiVersion: v1
      kind: Namespace
      metadata:
        name: ledgerlite-staging
        labels:
          app.kubernetes.io/part-of: ledgerlite
          environment: staging

  # Staging ingress host
  - patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.staging.ledgerlite.app
    target:
      kind: Ingress
      name: ledgerlite-ingress

  # Remove in-cluster Postgres — staging uses Cloud SQL (managed, persistent)
  # After terraform apply, get the IP: terraform output cloudsql_private_ip
  - patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: postgres
    target:
      kind: StatefulSet
      name: postgres
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres
    target:
      kind: Service
      name: postgres

  # Staging secrets — real values applied via kubectl (NOT committed to git).
  # Run: infrastructure/kubernetes/overlays/staging/apply-secrets.sh
  # Cloud SQL private IP: 10.82.0.3 (terraform output cloudsql_private_ip)
  - patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: ledgerlite-secrets
      stringData:
        DATABASE_URL: "postgresql+asyncpg://ledgerlite:REPLACE_WITH_DB_PASSWORD@10.82.0.3:5432/ledgerlite"
        REDIS_URL: "redis://redis:6379"

  # Staging image tags
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-service
      spec:
        template:
          spec:
            containers:
              - name: auth-service
                image: ghcr.io/sunnysanthosh/ledgerlite/auth-service:latest
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: user-service
      spec:
        template:
          spec:
            containers:
              - name: user-service
                image: ghcr.io/sunnysanthosh/ledgerlite/user-service:latest
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: transaction-service
      spec:
        template:
          spec:
            containers:
              - name: transaction-service
                image: ghcr.io/sunnysanthosh/ledgerlite/transaction-service:latest
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ledger-service
      spec:
        template:
          spec:
            containers:
              - name: ledger-service
                image: ghcr.io/sunnysanthosh/ledgerlite/ledger-service:latest
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: report-service
      spec:
        template:
          spec:
            containers:
              - name: report-service
                image: ghcr.io/sunnysanthosh/ledgerlite/report-service:latest
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ai-service
      spec:
        template:
          spec:
            containers:
              - name: ai-service
                image: ghcr.io/sunnysanthosh/ledgerlite/ai-service:latest
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-service
      spec:
        template:
          spec:
            containers:
              - name: notification-service
                image: ghcr.io/sunnysanthosh/ledgerlite/notification-service:latest
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: sync-service
      spec:
        template:
          spec:
            containers:
              - name: sync-service
                image: ghcr.io/sunnysanthosh/ledgerlite/sync-service:latest
