apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ledgerlite-staging

resources:
  - ../../base

patches:
  # Override namespace resource to use staging name
  - patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: ledgerlite
      $patch: replace
      apiVersion: v1
      kind: Namespace
      metadata:
        name: ledgerlite-staging
        labels:
          app.kubernetes.io/part-of: ledgerlite
          environment: staging

  # Staging ingress host
  - patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.staging.ledgerlite.app
    target:
      kind: Ingress
      name: ledgerlite-ingress

  # Remove in-cluster Postgres — staging uses Cloud SQL (managed, persistent)
  # After terraform apply, get the IP: terraform output cloudsql_private_ip
  - patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: postgres
    target:
      kind: StatefulSet
      name: postgres
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres
    target:
      kind: Service
      name: postgres

  # Staging secrets — replace CLOUD_SQL_PRIVATE_IP with: terraform output cloudsql_private_ip
  - patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: ledgerlite-secrets
      stringData:
        JWT_SECRET: "staging-secret-change-me"
        DATABASE_USER: "ledgerlite"
        DATABASE_PASSWORD: "ledgerlite-staging"
        DATABASE_URL: "postgresql+asyncpg://ledgerlite:ledgerlite-staging@CLOUD_SQL_PRIVATE_IP:5432/ledgerlite"
        REDIS_URL: "redis://redis:6379"

  # Staging image tags
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-service
      spec:
        template:
          spec:
            containers:
              - name: auth-service
                image: ghcr.io/sunnysans/ledgerlite/auth-service:staging
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: user-service
      spec:
        template:
          spec:
            containers:
              - name: user-service
                image: ghcr.io/sunnysans/ledgerlite/user-service:staging
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: transaction-service
      spec:
        template:
          spec:
            containers:
              - name: transaction-service
                image: ghcr.io/sunnysans/ledgerlite/transaction-service:staging
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ledger-service
      spec:
        template:
          spec:
            containers:
              - name: ledger-service
                image: ghcr.io/sunnysans/ledgerlite/ledger-service:staging
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: report-service
      spec:
        template:
          spec:
            containers:
              - name: report-service
                image: ghcr.io/sunnysans/ledgerlite/report-service:staging
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ai-service
      spec:
        template:
          spec:
            containers:
              - name: ai-service
                image: ghcr.io/sunnysans/ledgerlite/ai-service:staging
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-service
      spec:
        template:
          spec:
            containers:
              - name: notification-service
                image: ghcr.io/sunnysans/ledgerlite/notification-service:staging
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: sync-service
      spec:
        template:
          spec:
            containers:
              - name: sync-service
                image: ghcr.io/sunnysans/ledgerlite/sync-service:staging
